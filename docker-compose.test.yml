services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ticketfast
      POSTGRES_PASSWORD: ticketfast
      POSTGRES_DB: ticketfast_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketfast -d ticketfast_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: postgresql+psycopg://ticketfast:ticketfast@db-test:5432/ticketfast_test
    ports:
      - "8001:8001"
    depends_on:
      db-test:
        condition: service_healthy

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TicketFast - Reservas</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; }
    label { display: block; margin: 12px 0 4px; font-weight: 600; }
    input, select, button { width: 100%; padding: 8px; box-sizing: border-box; }
    button { margin-top: 16px; cursor: pointer; }
    #seccion-resumen-total { margin-top: 24px; font-size: 1.4rem; font-weight: 700; }
  </style>
</head>
<body>
  <h1>Reserva de asientos</h1>

  <form id="form-reserva">
    <label for="input-email-cliente">Correo del cliente</label>
    <input type="email" id="input-email-cliente" data-testid="input-email-cliente" required />

    <label for="select-zona-evento">Zona</label>
    <select id="select-zona-evento" data-testid="select-zona-evento">
      <option value="General">General</option>
      <option value="VIP">VIP</option>
    </select>

    <label for="input-cantidad-asientos">Cantidad de asientos</label>
    <input type="number" id="input-cantidad-asientos" data-testid="input-cantidad-asientos" min="1" value="1" />

    <button type="submit" data-testid="btn-confirmar-reserva">Confirmar reserva</button>
  </form>

  <div id="seccion-resumen-total" data-testid="seccion-resumen-total"></div>

  <script>
    const API_URL = "http://localhost:8001";

    document.getElementById("form-reserva").addEventListener("submit", async (evento) => {
      evento.preventDefault();

      const payload = {
        zona: document.getElementById("select-zona-evento").value,
        cantidad: Number(document.getElementById("input-cantidad-asientos").value),
        cliente_email: document.getElementById("input-email-cliente").value,
      };

      const respuesta = await fetch(`${API_URL}/reservas/frontend-evento`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      const reserva = await respuesta.json();
      const totalFormateado = reserva.total.toLocaleString("de-DE");
      document.getElementById("seccion-resumen-total").textContent =
        `Total: $${totalFormateado}`;
    });
  </script>
</body>
</html>
